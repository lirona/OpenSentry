name = "opensentry"
compatibility_date = "2026-04-08"
pages_build_output_dir = "./website"

# ---------------------------------------------------------------------------
# Cloudflare Pages configuration
# ---------------------------------------------------------------------------
# This project deploys:
#   - static assets from `./website`
#   - serverless API routes from `./functions`
#
# The Pages Functions code reads environment variables from `context.env`.
# Keep secrets out of git. Configure them in the Cloudflare dashboard:
#
#   Workers & Pages → <project> → Settings → Variables and Secrets
#
# Local development: create a `.dev.vars` file (gitignored) at the project
# root with the same keys, e.g.:
#
#   AI_API_KEY="..."
#   AI_MODEL="..."
#   AI_AGENT_CONCURRENCY="1"
#   ANALYZE_IP_COOLDOWN_MS="15000"
#   ANALYZE_DAILY_CAP="0"
#   ETHERSCAN_API_KEY="..."
#
# Access inside Pages Functions via `context.env.AI_API_KEY`, etc.
#
# Required secret bindings:
#   - AI_API_KEY
#   - ETHERSCAN_API_KEY
#
# Optional plain-text / secret bindings:
#   - AI_MODEL
#   - AI_AGENT_CONCURRENCY
#   - ANALYZE_IP_COOLDOWN_MS
#   - ANALYZE_DAILY_CAP
#
# v1 does not use KV, D1, R2, Durable Objects, or Queues.
# ---------------------------------------------------------------------------
